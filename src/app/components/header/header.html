<header class="header">
    <div class="header-container">

        <div class="logo">
            <img src="#" >
            NexusShop
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Shop & Dine</a>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Buscar produtos..." />
            <button><mat-icon>search</mat-icon></button>
        </div>

        @if (loggedIn){
        <div class="actions">
            <a href="#"><mat-icon>favorite</mat-icon></a>
            <a href="#">
                <mat-icon>shopping_cart</mat-icon>
                <span class="badge">2</span>
            </a>
            <button>
                <img src="#" alt="account-profile">
            </button>
        </div>
        } @else {
        <div class="actions">
            <a href="#">Login</a>

            <div>|</div>

            <a href="#">
                <mat-icon>shopping_cart</mat-icon>
                <span class="badge">2</span>
            </a>
        </div>
        }
    </div>
</header>
